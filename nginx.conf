server {
    listen 80;
    listen [::]:80;
    server_name vibecodesite.ru www.vibecodesite.ru;
    return 301 https://vibecodesite.ru$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.vibecodesite.ru;
    ssl_certificate /etc/letsencrypt/live/vibecodesite.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vibecodesite.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    return 301 https://vibecodesite.ru$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name vibecodesite.ru;
    ssl_certificate /etc/letsencrypt/live/vibecodesite.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vibecodesite.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    root /var/www/vibecodesite;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
